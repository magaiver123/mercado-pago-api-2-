<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 430 430" width="430" height="430" preserveAspectRatio="xMidYMid meet">
<style>
  #device-group {
    transform-origin: 215px 215px;
    animation: phoneApproach 3.6s cubic-bezier(.22,.75,.18,1) infinite;
    will-change: transform;
  }

  #screen-reflection {
    animation: screenFlash 3.6s ease-in-out infinite;
  }

  #scan-target {
    transform-origin: 201px 191px;
    animation: targetPulse 3.6s ease-in-out infinite;
  }

  #scan-pulse {
    animation: fieldPulse 3.6s ease-in-out infinite;
  }

  #scan-glow {
    animation: scanSweepGlow 3.6s cubic-bezier(.3,0,.16,1) infinite;
  }

  #scan-line {
    animation: scanSweep 3.6s cubic-bezier(.3,0,.16,1) infinite;
  }

  @keyframes phoneApproach {
    0%   { transform: translate(-22px, 20px) rotate(-13deg) scale(.965); }
    14%  { transform: translate(-18px, 16px) rotate(-11deg) scale(.973); }
    28%  { transform: translate(-8px, 6px) rotate(-5.5deg) scale(.988); }
    40%  { transform: translate(1px, -1px) rotate(.8deg) scale(1); }
    48%  { transform: translate(0px, 0px) rotate(0deg) scale(1); }
    70%  { transform: translate(0px, 0px) rotate(0deg) scale(1); }
    82%  { transform: translate(-1px, 1px) rotate(-.35deg) scale(.998); }
    100% { transform: translate(-22px, 20px) rotate(-13deg) scale(.965); }
  }

  @keyframes screenFlash {
    0%, 24%, 100% { opacity: 0; }
    30% { opacity: .06; }
    42% { opacity: .12; }
    58% { opacity: .08; }
    72% { opacity: 0; }
  }

  @keyframes targetPulse {
    0%, 26%, 100% { opacity: 1; }
    34% { opacity: .82; }
    42% { opacity: 1; }
    50% { opacity: .72; }
    58% { opacity: 1; }
    66% { opacity: .88; }
    74% { opacity: 1; }
  }

  @keyframes fieldPulse {
    0%, 24%, 100% { opacity: 0; }
    30% { opacity: .08; }
    40% { opacity: .18; }
    52% { opacity: .24; }
    64% { opacity: .16; }
    72% { opacity: 0; }
  }

  @keyframes scanSweep {
    0%, 26%, 100% { transform: translateY(-50px) scaleX(.82); opacity: 0; }
    30% { transform: translateY(-36px) scaleX(.88); opacity: .1; }
    36% { transform: translateY(-18px) scaleX(.96); opacity: 1; }
    46% { transform: translateY(10px) scaleX(1); opacity: 1; }
    56% { transform: translateY(36px) scaleX(.98); opacity: .98; }
    62% { transform: translateY(52px) scaleX(.95); opacity: .85; }
    68% { transform: translateY(66px) scaleX(.9); opacity: 0; }
  }

  @keyframes scanSweepGlow {
    0%, 26%, 100% { transform: translateY(-52px) scaleX(.72); opacity: 0; }
    32% { opacity: .22; }
    38% { transform: translateY(-18px) scaleX(.92); opacity: .58; }
    48% { transform: translateY(10px) scaleX(1.04); opacity: .82; }
    58% { transform: translateY(38px) scaleX(1.02); opacity: .68; }
    64% { transform: translateY(58px) scaleX(.94); opacity: .34; }
    68% { opacity: 0; }
  }
</style>

<defs>
  <clipPath id="scan-clip">
    <rect x="147" y="145" width="119" height="105" rx="18" ry="18" />
  </clipPath>
  <filter id="soft-blur" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="7" />
  </filter>
</defs>
