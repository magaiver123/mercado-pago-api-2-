<style id="v3-override">
  #phoneGroup, .phoneGroup, [id*="phone"], [class*="phone"] {
    animation: phoneMoveV3 1.15s cubic-bezier(0.45, 0.02, 0.55, 0.98) infinite !important;
    transform-origin: 72% 70% !important;
    will-change: transform;
  }

  @keyframes phoneMoveV3 {
    0%   { transform: translate(0px, 0px) rotate(0deg); }
    25%  { transform: translate(-16px, -8px) rotate(-9deg); }
    50%  { transform: translate(-31px, -15px) rotate(-16deg); }
    75%  { transform: translate(-16px, -8px) rotate(-9deg); }
    100% { transform: translate(0px, 0px) rotate(0deg); }
  }
</style>

